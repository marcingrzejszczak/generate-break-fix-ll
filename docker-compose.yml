services:
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.11.0
    ports:
      - "8474:8474"   # Toxiproxy API
      - "9753:9753"   # Proxy listening port for service A
    volumes:
      - ./toxiproxy.json:/config/toxiproxy.json
    command: ["-host=0.0.0.0", "-config=/config/toxiproxy.json"]
